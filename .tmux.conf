# prefixキーをC-qに変更する
set -g prefix C-g

# C-bのキーバインドを解除する
unbind C-b

# キーストロークのディレイを減らす
set -sg escape-time 0

# ウィンドウのインデックスを1から始める
set -g base-index 1

# ペインのインデックスを1から始める
setw -g pane-base-index 1

# | でペインを縦に分割する
# bind | split-window -h

# - でペインを横に分割する
# <F2>bind - split-window -v

# Vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# 256色端末を使用する
# set -g default-terminal "screen-256color"
set -g default-terminal "xterm-256color"
# set pane colors - highlight the active pane
set-option -g pane-border-fg colour235 #base02
set-option -g pane-active-border-fg colour240 #base01


# コマンドラインの色を設定する
set -g message-fg white
set -g message-bg black
set -g message-attr bright

# ステータスバーの色を設定する
set -g status-fg white
set -g status-bg black
## 左パネルを設定する
set -g status-left-length 40
set -g status-left "#[fg=green]Session: #S #[fg=yellow]#I #[fg=cyan]#P"
# set-option -g status-right '#(get_load_average_tmux)#(get_volume_tmux)#(get_battery_tmux)#(get_ssid_tmux)#[fg=colour014] %H:%M | %m/%d %a#[default]'
set-option -g status-right '#(battery tmux) [%Y-%m-%d(%a) %H:%M]'
## 右パネルを設定する
#set -g status-right "#[fg=cyan][%Y-%m-%d(%a) %H:%M]"
## リフレッシュの間隔を設定する(デフォルト 15秒)
set -g status-interval 1
## ウィンドウリストの位置を中心寄せにする
set -g status-justify centre
## ヴィジュアルノーティフィケーションを有効にする
setw -g monitor-activity on
set -g visual-activity on
## ステータスバーを上部に表示する
set -g status-position top

## クリップボード共有を有効にする
set-option -g default-command "reattach-to-user-namespace -l zsh"

# マウス操作を有効にする
setw -g mouse on

# マウス操作を有効にする
#set-option -g mouse on
# bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# 新しくタブを開いたときにカレントディレクトリで開く
bind c new-window -c '#{pane_current_path}'

# 新しくペインを利用して画面分割した際もカレントディレクトリで開く
bind | split-window -hc "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
